groups:
  - name: backend-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[1m]) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected on {{ $labels.endpoint }}"
          description: "Endpoint {{ $labels.endpoint }} is returning 5xx errors (rate > 0.5/s)"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_latency_seconds_bucket[1m])) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected on {{ $labels.endpoint }}"
          description: "95th percentile latency is above 1s (current: {{ $value }}s)"
